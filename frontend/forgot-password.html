<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MAIL SARTHI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="toast-container-custom"></div>

    <div id="page-content" style="display: none;">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo d-flex align-items-center justify-content-center gap-2">
                        <img src="static/images/logo.png" alt="Logo" style="height: 48px; width: 48px; object-fit: contain;">
                        <span>MAIL SARTHI</span>
                    </div>
                    <p class="text-secondary text-sm" id="authSubTitle">Reset your Password</p>
                </div>
                
                <!-- STEP 1: Send OTP -->
                <div id="step-send-otp">
                    <form id="forgotPasswordForm">
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold text-secondary small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color text-muted"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control form-control-premium border-start-0 ps-0" id="email" name="email" placeholder="Enter your email" required autofocus>
                            </div>
                            <div class="form-text text-muted small mt-2">
                                Enter the email address associated with your account and we will send you a 6-digit verification code (OTP).
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-premium w-100 py-2.5 mb-3 text-white" id="submitBtn">
                            <span id="btnText">Send OTP</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>

                <!-- STEP 2: Verify OTP & Reset Password -->
                <div id="step-verify-reset" class="d-none">
                    <div class="alert alert-premium text-sm mb-4" role="alert" style="background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); color: var(--text-primary);">
                        <i class="fas fa-circle-info text-primary me-2"></i>
                        Verification code sent to: <strong id="display-email"></strong>
                    </div>

                    <form id="resetPasswordForm">
                        <div class="mb-3">
                            <label for="otp" class="form-label fw-semibold text-secondary small">Verification Code (OTP)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color text-muted"><i class="fas fa-key"></i></span>
                                <input type="text" class="form-control form-control-premium border-start-0 ps-0" id="otp" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" pattern="\d{6}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold text-secondary small">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color text-muted"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control form-control-premium border-start-0 ps-0" id="password" name="password" placeholder="Choose new password" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-semibold text-secondary small">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 border-color text-muted"><i class="fas fa-shield-halved"></i></span>
                                <input type="password" class="form-control form-control-premium border-start-0 ps-0" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-premium w-100 py-2.5 mb-3 text-white" id="resetBtn">
                            <span id="resetBtnText">Update Password</span>
                            <span id="resetBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>
                
                <div class="text-center mt-3">
                    <p class="text-secondary small mb-0">Remembered your password? <a href="login.html" class="text-primary fw-medium text-decoration-none">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
    
    <script>
        let requestedEmail = '';

        // Form Step 1: Send OTP
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            // Show loading state
            submitBtn.disabled = true;
            btnText.textContent = "Sending...";
            btnSpinner.classList.remove('d-none');
            
            try {
                const response = await apiFetch('/api/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    showToast('Success', data.message || 'OTP sent successfully.', 'success');
                    
                    // Transition to step 2
                    requestedEmail = email;
                    document.getElementById('display-email').textContent = email;
                    document.getElementById('authSubTitle').textContent = "Verify & Reset Password";
                    document.getElementById('step-send-otp').classList.add('d-none');
                    document.getElementById('step-verify-reset').classList.remove('d-none');
                } else {
                    showToast('Error', data.message || 'Failed to send OTP.', 'danger');
                }
            } catch (err) {
                console.error('Forgot password OTP error:', err);
                showToast('Error', 'An error occurred. Please try again.', 'danger');
            } finally {
                // Hide loading state
                submitBtn.disabled = false;
                btnText.textContent = "Send OTP";
                btnSpinner.classList.add('d-none');
            }
        });

        // Form Step 2: Verify OTP and Reset Password
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const resetBtn = document.getElementById('resetBtn');
            const resetBtnText = document.getElementById('resetBtnText');
            const resetBtnSpinner = document.getElementById('resetBtnSpinner');

            if (password !== confirm_password) {
                showToast('Validation Error', 'Passwords do not match.', 'warning');
                return;
            }

            if (otp.length !== 6) {
                showToast('Validation Error', 'OTP must be exactly 6 digits.', 'warning');
                return;
            }

            // Show loading state
            resetBtn.disabled = true;
            resetBtnText.textContent = "Updating...";
            resetBtnSpinner.classList.remove('d-none');

            try {
                const response = await apiFetch('/api/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ email: requestedEmail, otp, password, confirm_password })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    showToast('Success', data.message || 'Password reset successfully.', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showToast('Error', data.message || 'Verification or password reset failed.', 'danger');
                }
            } catch (err) {
                console.error('Reset password OTP verification error:', err);
                showToast('Error', 'An error occurred. Please try again.', 'danger');
            } finally {
                // Hide loading state
                resetBtn.disabled = false;
                resetBtnText.textContent = "Update Password";
                resetBtnSpinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
