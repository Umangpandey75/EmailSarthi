<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Single Email | MAIL SARTHI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Quill WYSIWYG CSS -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
    
    <style>
        .fs-7 { font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="toast-container-custom"></div>

    <div id="app-container">
        <!-- layout.js will inject the sidebar and top navbar here -->
    </div>

    <!-- Raw content container hidden by default -->
    <div id="page-content" style="display: none;">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-glass p-4 h-100">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h5 class="fw-bold mb-0">Compose & Send</h5>
                        <div class="d-flex align-items-center gap-2">
                            <label for="templateSelector" class="small text-secondary text-nowrap fw-semibold">Load Template:</label>
                            <select class="form-select form-control-premium py-1 fs-7" id="templateSelector" style="max-width: 180px;">
                                <option value="" selected>-- Select --</option>
                            </select>
                        </div>
                    </div>

                    <form id="sendEmailForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-5">
                                <label for="recipient_name" class="form-label fw-semibold text-secondary small">Recipient Name (Optional)</label>
                                <input type="text" class="form-control form-control-premium" id="recipient_name" name="recipient_name" placeholder="Jane Doe">
                            </div>
                            <div class="col-md-7">
                                <label for="recipient_email" class="form-label fw-semibold text-secondary small">Recipient Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control form-control-premium" id="recipient_email" name="recipient_email" placeholder="jane@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label fw-semibold text-secondary small">Email Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-premium" id="subject" name="subject" placeholder="Enter email subject" required>
                        </div>

                        <div class="mb-2 d-flex flex-wrap gap-2 align-items-center">
                            <span class="small text-secondary fw-medium">Insert Tag:</span>
                            <button type="button" class="var-pill" onclick="insertVariable('{name}')">
                                <i class="fas fa-tag"></i> {name}
                            </button>
                            <button type="button" class="var-pill" onclick="insertVariable('{email}')">
                                <i class="fas fa-tag"></i> {email}
                            </button>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small d-block">Email Body (HTML/Rich Text) <span class="text-danger">*</span></label>
                            <div id="editor"></div>
                            <input type="hidden" id="body_html" name="body_html">
                        </div>

                        <div class="mb-4">
                            <label for="attachments" class="form-label fw-semibold text-secondary small">Attachments (Optional)</label>
                            <input type="file" class="form-control form-control-premium" id="attachments" name="attachments" multiple>
                        </div>

                        <button type="submit" class="btn btn-premium w-100 text-white py-2.5" id="sendBtn">
                            <i class="fas fa-paper-plane me-1"></i> Send Email Now
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card-glass p-4 h-100 d-flex flex-column">
                    <h5 class="fw-bold mb-3">Live Preview</h5>

                    <div class="bg-body border border-color rounded p-3 mb-3" style="font-size: 0.85rem;">
                        <div class="mb-1 text-secondary"><strong class="text-primary-emphasis">From:</strong> <span id="previewFrom">...</span></div>
                        <div class="mb-1 text-secondary"><strong class="text-primary-emphasis">To:</strong> <span id="previewTo">Recipient &lt;email@example.com&gt;</span></div>
                        <div class="mb-0 text-secondary"><strong class="text-primary-emphasis">Subject:</strong> <span id="previewSubject" class="text-dark-emphasis fw-semibold">No Subject</span></div>
                    </div>

                    <div class="preview-container flex-grow-1" id="previewPane">
                        <p class="text-muted opacity-50 text-center my-5">Enter recipient details and compose your message.</p>
                    </div>

                    <div class="mt-3 pt-3 border-top border-color">
                        <small class="text-secondary" id="dailyLimitUsageText">
                            Daily limit: 0 / 0 sent today
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="static/js/main.js"></script>
    <script src="static/js/layout.js"></script>
    
    <script>
        let quill;

        document.addEventListener('appReady', async () => {
            // 1. Initialize Quill
            quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: 'Write your email body here...',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'header': [1, 2, 3, false] }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'clean']
                    ]
                }
            });

            // 2. Add input change listeners
            recipientNameInput.addEventListener('input', updatePreview);
            recipientEmailInput.addEventListener('input', updatePreview);
            subjectInput.addEventListener('input', updatePreview);
            quill.on('text-change', updatePreview);

            // 3. Load configurations & SMTP settings for From: display and templates
            try {
                // Fetch SMTP limits & configs
                const settingsResp = await apiFetch('/api/dashboard');
                if (settingsResp.ok) {
                    const data = await settingsResp.json();
                    document.getElementById('previewFrom').textContent = data.settings.gmail_address || '(Configure SMTP in Settings)';
                    document.getElementById('dailyLimitUsageText').textContent = `Daily limit: ${data.settings.sent_today} / ${data.settings.daily_limit} sent today`;
                }

                // Fetch Templates list
                const templatesResp = await apiFetch('/api/templates');
                if (templatesResp.ok) {
                    const data = await templatesResp.json();
                    const selector = document.getElementById('templateSelector');
                    data.templates.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t.id;
                        opt.textContent = t.name;
                        selector.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        });

        const recipientNameInput = document.getElementById('recipient_name');
        const recipientEmailInput = document.getElementById('recipient_email');
        const subjectInput = document.getElementById('subject');
        const previewTo = document.getElementById('previewTo');
        const previewSubject = document.getElementById('previewSubject');
        const previewPane = document.getElementById('previewPane');
        const hiddenBodyInput = document.getElementById('body_html');
        const form = document.getElementById('sendEmailForm');
        const sendBtn = document.getElementById('sendBtn');
        const templateSelector = document.getElementById('templateSelector');

        function updatePreview() {
            if (!quill) return;
            const name = recipientNameInput.value.trim() || 'Recipient';
            const email = recipientEmailInput.value.trim() || 'email@example.com';
            const subject = subjectInput.value;
            const html = quill.getSemanticHTML();

            previewTo.textContent = `${name} <${email}>`;

            const compiledSubject = subject.replace(/{name}/g, name).replace(/{email}/g, email);
            const compiledHtml = html.replace(/{name}/g, name).replace(/{email}/g, email);

            previewSubject.textContent = compiledSubject || 'No Subject';
            if (quill.getText().trim() === '') {
                previewPane.innerHTML = '<p class="text-muted opacity-50 text-center my-5">Enter recipient details and compose your message.</p>';
            } else {
                previewPane.innerHTML = compiledHtml;
            }

            hiddenBodyInput.value = html;
        }

        function insertVariable(variable) {
            if (!quill) return;
            const range = quill.getSelection();
            if (range) {
                quill.insertText(range.index, variable);
                quill.setSelection(range.index + variable.length);
            } else {
                quill.insertText(quill.getLength() - 1, variable);
            }
            updatePreview();
        }
        window.insertVariable = insertVariable;

        templateSelector.addEventListener('change', async () => {
            const templateId = templateSelector.value;
            if (!templateId) return;

            try {
                const response = await apiFetch(`/api/templates/${templateId}`);
                if (response.ok) {
                    const data = await response.json();
                    subjectInput.value = data.subject;
                    quill.clipboard.dangerouslyPasteHTML(data.body_html);
                    updatePreview();
                    showToast('Success', `Loaded template '${data.name}'`, 'success');
                } else {
                    showToast('Error', 'Failed to fetch template details.', 'danger');
                }
            } catch (e) {
                console.error(e);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (quill.getText().trim() === '') {
                showToast('Validation Error', 'Email body cannot be empty.', 'warning');
                return;
            }
            
            hiddenBodyInput.value = quill.getSemanticHTML();
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Sending...';
            
            const formData = new FormData(form);
            
            try {
                const response = await apiFetch('/api/send-email', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    showToast('Success', `Email sent successfully to ${recipientEmailInput.value}.`, 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showToast('Failed to Send', data.message || 'Error occurred while sending.', 'danger');
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane me-1"></i> Send Email Now';
                }
            } catch (err) {
                console.error(err);
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane me-1"></i> Send Email Now';
            }
        });
    </script>
</body>
</html>
