<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MAIL SARTHI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="toast-container-custom"></div>

    <div id="page-content" style="display: none;">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo d-flex align-items-center justify-content-center gap-2">
                        <img src="static/images/logo.png" alt="Logo" style="height: 48px; width: 48px; object-fit: contain;">
                        <span>MAIL SARTHI</span>
                    </div>
                    <p class="text-secondary text-sm">Campaign Email Automator</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary small">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-color text-muted"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control form-control-premium border-start-0 ps-0" id="username" name="username" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <label for="password" class="form-label fw-semibold text-secondary small mb-0">Password</label>
                            <a href="forgot-password.html" class="text-primary small text-decoration-none fw-medium">Forgot password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-color text-muted"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control form-control-premium border-start-0 ps-0" id="password" name="password" placeholder="Enter password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-premium w-100 py-2.5 mb-3 text-white">Sign In</button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="text-secondary small mb-0">Don't have an account? <a href="register.html" class="text-primary fw-medium text-decoration-none">Create account</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const response = await apiFetch('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    showToast('Success', data.message || 'Logged in successfully.', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showToast('Error', data.message || 'Invalid credentials.', 'danger');
                }
            } catch (err) {
                console.error('Login error:', err);
            }
        });
    </script>
</body>
</html>
